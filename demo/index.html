<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horde of Bots board</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='3' r='2' fill='%23c4724a'/><rect x='15' y='4' width='2' height='5' fill='%23c4724a'/><rect x='4' y='9' width='24' height='20' rx='4' fill='%23c4724a'/><circle cx='12' cy='19' r='3' fill='%230a0a0a'/><circle cx='20' cy='19' r='3' fill='%230a0a0a'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=Big+Shoulders+Display:wght@500;700;900&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --bg-2: #111111;
  --ink: #f2f1ee;
  --ink-soft: #d5d3cf;
  --ink-dim: #8a8680;
  --ink-dimmer: #55514c;
  --line: #1f1d1b;
  --accent: #c4724a;
  --display: 'Big Shoulders Display', 'Inter', sans-serif;
  --read: 'Atkinson Hyperlegible', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --mono: 'JetBrains Mono', ui-monospace, 'SFMono-Regular', Consolas, monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
::selection { background: var(--accent); color: var(--bg); }
body {
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.6;
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
header {
  border-bottom: 1px solid var(--line);
  padding: 0 32px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  background: rgba(10,10,10,0.75);
  -webkit-backdrop-filter: blur(14px);
  backdrop-filter: blur(14px);
  z-index: 10;
}
.logo {
  font-family: var(--display);
  font-size: 1.25rem;
  font-weight: 900;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--ink);
}
.logo span { color: var(--accent); }
.header-meta {
  font-family: var(--mono);
  font-size: 0.7rem;
  font-weight: 400;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink-dimmer);
}
main { max-width: 1280px; margin: 0 auto; padding: 32px; }
.tabs {
  display: flex;
  gap: 0;
  margin-bottom: 32px;
  border-bottom: 1px solid var(--line);
}
.tab {
  padding: 14px 0;
  margin-right: 32px;
  margin-bottom: -1px;
  border: none;
  border-bottom: 1px solid transparent;
  background: none;
  cursor: pointer;
  font-family: var(--mono);
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--ink-dim);
  transition: color 0.2s ease, border-color 0.2s ease;
}
.tab:hover { color: var(--ink); }
.tab.active {
  color: var(--ink);
  border-bottom-color: var(--accent);
}
.view { display: none; }
.view.active { display: block; }
.board {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 0;
  border-top: 1px solid var(--line);
  border-left: 1px solid var(--line);
}
.board > div {
  border-right: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  padding: 24px;
  min-width: 0;
}
.board.show-rejected { grid-template-columns: repeat(5, minmax(0, 1fr)); }
.col-rejected { display: none; }
.board.show-rejected .col-rejected { display: block; }
.card.not-doing { opacity: 0.4; }
.card.not-doing .card-title { text-decoration: line-through; color: var(--ink-dim); }
.btn-toggle-rejected {
  padding: 8px 16px;
  border: 1px solid var(--line);
  border-radius: 0;
  cursor: pointer;
  font-family: var(--mono);
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  background: none;
  color: var(--ink-dim);
  margin-bottom: 24px;
  transition: color 0.2s ease, border-color 0.2s ease;
}
.filter-bar {
  display: flex;
  flex-wrap: wrap;
  align-items: flex-end;
  gap: 16px;
  margin-bottom: 24px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--line);
}
.filter-group { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
.filter-label {
  font-family: var(--mono);
  font-size: 0.65rem;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-dim);
}
.filter-select {
  font-family: var(--mono);
  font-size: 0.75rem;
  letter-spacing: 0.05em;
  color: var(--ink);
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: 0;
  padding: 6px 10px;
  cursor: pointer;
  transition: border-color 0.2s ease;
  min-width: 140px;
}
.filter-select:hover { border-color: var(--ink-dim); }
.filter-select:focus { outline: none; border-color: var(--accent); }
.filter-clear {
  font-family: var(--mono);
  font-size: 0.65rem;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-dim);
  background: transparent;
  border: 1px solid var(--line);
  border-radius: 0;
  padding: 7px 14px;
  cursor: pointer;
  transition: color 0.2s ease, border-color 0.2s ease;
}
.filter-clear:hover { color: var(--ink); border-color: var(--ink-dim); }
.filter-clear:focus { outline: none; border-color: var(--accent); color: var(--ink); }
.filter-toggle {
  font-family: var(--mono);
  font-size: 0.65rem;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-dim);
  background: transparent;
  border: 1px solid var(--line);
  border-radius: 0;
  padding: 7px 14px;
  cursor: pointer;
  transition: color 0.2s ease, border-color 0.2s ease;
}
.filter-toggle:hover { color: var(--ink); border-color: var(--ink-dim); }
.filter-toggle:focus { outline: none; border-color: var(--accent); color: var(--ink); }
.filter-toggle.active { color: var(--accent); border-color: var(--accent); }
@media (max-width: 560px) {
  .filter-bar { gap: 12px; }
  .filter-select { min-width: 120px; }
}
.btn-toggle-rejected:hover { color: var(--ink); border-color: var(--ink-dim); }
.btn-toggle-rejected.active { color: var(--ink); border-color: var(--ink-dim); }
@media (max-width: 900px) { .board { grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); } .board.show-rejected { grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); } }
@media (max-width: 560px) { .board { grid-template-columns: 1fr; } .board.show-rejected { grid-template-columns: 1fr; } }
.col-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.col-name {
  font-family: var(--mono);
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--accent);
  position: relative;
  padding-left: 32px;
}
.col-name::before {
  content: '';
  position: absolute;
  left: 0;
  top: 50%;
  width: 24px;
  height: 1px;
  background: var(--accent);
}
.col-count {
  font-family: var(--mono);
  font-size: 0.7rem;
  letter-spacing: 0.15em;
  color: var(--ink-dimmer);
}
.cards { display: flex; flex-direction: column; gap: 12px; }
.card {
  background: transparent;
  border: 1px solid var(--line);
  border-radius: 0;
  padding: 16px;
  cursor: pointer;
  transition: border-color 0.2s ease, background 0.2s ease;
  min-width: 0;
}
.card:hover { border-color: var(--ink-dim); background: var(--bg-2); }
.card.status-open       { border: 1px solid var(--ink-dimmer); }
.card.status-done       { border: 2px solid var(--accent); }
.card.status-inprogress { position: relative; border: 1px dashed var(--accent); }
.card.status-blocked    { border: 1px dotted var(--accent); }
.card.stale-claim { outline: 1px dotted var(--accent); outline-offset: 2px; }
.card-stale-meta {
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 0.08em;
  color: var(--ink-dim);
  margin-left: auto;
  text-align: right;
  text-transform: uppercase;
}
.card.stale-claim .card-stale-meta { color: var(--accent); }
.card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
.card-id {
  font-family: var(--read);
  font-size: 0.8rem;
  font-weight: 400;
  letter-spacing: 0.05em;
  color: var(--ink);
  white-space: nowrap;
}
.badges { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
.badge {
  font-family: var(--mono);
  font-size: 0.65rem;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 2px 7px;
  border: 1px solid var(--line);
  background: transparent;
  color: var(--ink-dim);
  border-radius: 0;
}
.b-critical { color: var(--accent); border-color: var(--accent); }
.b-high     { color: var(--ink); border-color: var(--ink-dim); }
.b-medium   { color: var(--ink-dim); border-color: var(--line); }
.b-low      { color: var(--ink-dimmer); border-color: var(--line); }
.b-effort   { color: var(--ink-dim); border-color: var(--line); }
.card-crab {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-family: var(--mono);
  font-size: 0.65rem;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 2px 8px;
  border: 1px solid var(--line);
  border-radius: 0;
  background: transparent;
  white-space: nowrap;
  max-width: 130px;
  overflow: hidden;
  text-overflow: ellipsis;
}
.hb-robot {
  position: absolute;
  width: 18px;
  height: 18px;
  pointer-events: none;
  z-index: 1;
  animation: hb-robot-walk 12s linear infinite;
}
@keyframes hb-robot-walk {
  0%   { top: -10px;             left: -10px; }
  25%  { top: -10px;             left: calc(100% - 8px); }
  50%  { top: calc(100% - 8px);  left: calc(100% - 8px); }
  75%  { top: calc(100% - 8px);  left: -10px; }
  100% { top: -10px;             left: -10px; }
}
.card-title {
  font-family: var(--read);
  font-size: 0.95rem;
  font-weight: 400;
  line-height: 1.3;
  letter-spacing: 0;
  color: var(--ink);
  margin-bottom: 8px;
  overflow-wrap: anywhere;
  word-break: break-word;
  min-width: 0;
}
.card-fs {
  display: inline-block;
  max-width: 100%;
  font-family: var(--mono);
  font-size: 0.65rem;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink-dim);
  border: 1px solid var(--line);
  border-radius: 0;
  padding: 2px 8px;
  margin-bottom: 10px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-footer {
  display: flex;
  align-items: center;
  margin-top: 12px;
}
.card-rels { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
.card-rel {
  display: inline-flex;
  align-items: center;
  font-family: var(--mono);
  font-size: 0.65rem;
  font-weight: 500;
  letter-spacing: 0.1em;
  color: var(--ink-dim);
  border: 1px solid var(--line);
  border-radius: 0;
  padding: 2px 7px;
  white-space: nowrap;
}
.card-rel-more { color: var(--ink-dimmer); }
.dl-val.pre { white-space: pre-line; }
.card-detail { max-height: 0; overflow: hidden; transition: max-height 0.25s ease; }
.card.open .card-detail { max-height: 800px; }
.detail-inner {
  padding-top: 16px;
  margin-top: 16px;
  border-top: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.dl-label {
  font-family: var(--mono);
  font-size: 0.65rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--accent);
  margin-bottom: 6px;
}
.dl-val {
  font-family: var(--sans);
  font-size: 0.875rem;
  line-height: 1.7;
  color: var(--ink-soft);
}
.dl-list { list-style: none; font-family: var(--sans); font-size: 0.875rem; line-height: 1.7; color: var(--ink-soft); }
.dl-list li { padding-left: 14px; position: relative; margin-bottom: 4px; }
.dl-list li::before { content: ''; position: absolute; left: 0; top: 0.7em; width: 6px; height: 1px; background: var(--accent); }
.empty {
  font-family: var(--mono);
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-dimmer);
  padding: 12px 0;
}
.feature-sets { display: flex; flex-direction: column; gap: 24px; }
.feature-set { border: 1px solid var(--line); border-radius: 0; }
.feature-set-head {
  padding: 20px 24px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  border-bottom: 1px solid var(--line);
}
.feature-set-name {
  font-family: var(--read);
  font-size: 1.25rem;
  font-weight: 700;
  letter-spacing: 0;
  color: var(--ink);
  margin-bottom: 6px;
}
.feature-set-goal {
  font-family: var(--sans);
  font-size: 0.875rem;
  color: var(--ink-dim);
  line-height: 1.6;
}
.feature-set-status {
  font-family: var(--mono);
  font-size: 0.65rem;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 4px 10px;
  white-space: nowrap;
  background: transparent;
  border: 1px solid var(--line);
  border-radius: 0;
  color: var(--ink-dim);
  flex-shrink: 0;
}
.feature-set-prog-row {
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  border-bottom: 1px solid var(--line);
}
.prog-bar { flex: 1; height: 1px; background: var(--line); border-radius: 0; position: relative; overflow: visible; }
.prog-fill { height: 1px; background: var(--accent); border-radius: 0; }
.prog-label {
  font-family: var(--mono);
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-dimmer);
  white-space: nowrap;
}
.feature-set-cards { padding: 16px; display: flex; flex-wrap: wrap; gap: 12px; }
.feature-set-cards .card { width: calc(25% - 9px); min-width: 200px; }
@media (max-width: 900px) { .feature-set-cards .card { width: calc(50% - 6px); } }
@media (max-width: 560px) { .feature-set-cards .card { width: 100%; } }
.header-right { display: flex; align-items: center; gap: 24px; }
.btn-new {
  padding: 10px 20px;
  border: 1px solid var(--ink);
  border-radius: 0;
  cursor: pointer;
  font-family: var(--mono);
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  background: transparent;
  color: var(--ink);
  white-space: nowrap;
  transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
}
.btn-new:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }
.settings-note { font-family: var(--sans); font-size: 0.75rem; color: var(--ink-dim); margin-top: 14px; line-height: 1.6; }
.settings-note a { color: var(--ink); }
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(10,10,10,0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 50;
}
.modal {
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: 0;
  padding: 32px;
  width: calc(100% - 32px);
  max-width: 480px;
  max-height: 90vh;
  overflow-y: auto;
}
.modal-title {
  font-family: var(--read);
  font-size: 1.25rem;
  font-weight: 700;
  letter-spacing: 0;
  margin-bottom: 24px;
  color: var(--ink);
}
.field { margin-bottom: 20px; }
.field label {
  display: block;
  font-family: var(--mono);
  font-size: 0.65rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--ink-dim);
  margin-bottom: 8px;
}
.field input, .field select, .field textarea {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--line);
  border-radius: 0;
  padding: 8px 0;
  font-family: var(--sans);
  font-size: 0.9375rem;
  color: var(--ink);
  outline: none;
  transition: border-color 0.2s ease;
}
.field select { cursor: pointer; }
.field input:focus, .field select:focus, .field textarea:focus { border-bottom-color: var(--accent); }
.field textarea { resize: vertical; min-height: 70px; line-height: 1.6; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 20px; }
.field-row .field { margin-bottom: 0; }
.modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 28px; padding-top: 24px; border-top: 1px solid var(--line); }
.btn {
  padding: 10px 20px;
  border: 1px solid var(--line);
  border-radius: 0;
  cursor: pointer;
  font-family: var(--mono);
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  background: transparent;
  color: var(--ink-dim);
  transition: color 0.2s ease, border-color 0.2s ease, background 0.2s ease;
}
.btn:hover { color: var(--ink); border-color: var(--ink-dim); }
.btn-primary { color: var(--ink); border-color: var(--ink); }
.btn-primary:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }
#toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: var(--bg-2);
  color: var(--ink);
  border: 1px solid var(--line);
  padding: 12px 20px;
  border-radius: 0;
  font-family: var(--mono);
  font-size: 0.7rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  max-width: 560px;
  width: calc(100% - 48px);
  text-align: center;
  opacity: 0;
  transition: opacity 0.2s ease, transform 0.2s ease;
  pointer-events: none;
  z-index: 100;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
@keyframes hb-pulse {
  0%   { background: transparent; }
  30%  { background: rgba(196, 114, 74, 0.18); }
  100% { background: transparent; }
}
@keyframes hb-fadein {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.hb-moving { animation: hb-pulse 600ms ease; }
.hb-new { animation: hb-fadein 300ms ease; }
#setup-modal .modal { max-width: 420px; }
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  .hb-robot { display: none; }
}
</style>
</head>
<body>
<header>
  <div style="display:flex;align-items:center;gap:10px;">
    <span class="logo">horde of <span>bots</span></span>
    <span id="hb-live-indicator" style="display:none; align-items:center; gap:6px; font-family:var(--mono); font-size:0.65rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--ink-dim);">
      <span style="width:6px; height:6px; border-radius:50%; background:var(--accent); display:inline-block;"></span>
      <span class="hb-live-label">polling</span>
    </span>
  </div>
  <div class="header-right">
    <span class="header-meta" id="gen-time"></span>
    <button class="btn-new" id="btn-add-story" onclick="openModal()">+ Add story</button>
  </div>
</header>
<main>
  <div class="tabs">
    <button class="tab active" data-view="board" onclick="switchTab(this)">Board</button>
    <button class="tab" data-view="feature-sets" onclick="switchTab(this)">Feature Sets</button>
  </div>
  <div class="view active" id="view-board">
    <div class="filter-bar" id="filter-bar">
      <div class="filter-group">
        <label class="filter-label" for="flt-priority">Priority</label>
        <select class="filter-select" id="flt-priority">
          <option value="">All</option>
          <option>Critical</option>
          <option>High</option>
          <option>Medium</option>
          <option>Low</option>
        </select>
      </div>
      <div class="filter-group">
        <label class="filter-label" for="flt-effort">Effort</label>
        <select class="filter-select" id="flt-effort">
          <option value="">All</option>
          <option>XS</option>
          <option>S</option>
          <option>M</option>
          <option>L</option>
          <option>XL</option>
        </select>

    ? '<div class="card-rels"><span class="card-rel card-rel-failure" title="Failure mode: ' + esc(t.failure_mode) + '">\u26A0 ' + esc(t.failure_mode) + '</span></div>'
    : '';
  var failureRow = (t.status === 'blocked' && t.failure_mode)
    ? '<div><div class="dl-label">Failure mode</div><div class="dl-val">' + esc(t.failure_mode) + '</div></div>'
    : '';
  var verifChip = (t.status === 'done' && t.verification)
    ? '<div class="card-rels"><span class="card-rel card-rel-verif card-rel-verif-' + esc(t.verification) + '" title="Verification: ' + esc(t.verification) + '">' + esc(t.verification.toUpperCase()) + '</span></div>'
    : '';
  var verifRow = (t.status === 'done' && t.verification)
    ? '<div><div class="dl-label">Verification</div><div class="dl-val">' + esc(t.verification) + '</div></div>'
    : '';
  var staleMeta = '';
  var staleClass = '';
  if (t.status === 'in-progress') {
    var claimedDate = parseStartedDate(t.started);
    var lastCommitDate = t.last_commit_ct ? new Date(t.last_commit_ct * 1000) : null;
    var thresholdMs = (D.stale_after_hours || 4) * 60 * 60 * 1000;
    var nowMs = Date.now();
    var parts = [];
    if (claimedDate) parts.push('claimed ' + relativeAgo(claimedDate));
    if (lastCommitDate) parts.push('last commit ' + relativeAgo(lastCommitDate));
    if (parts.length) {
      staleMeta = '<div class="card-stale-meta">' + parts.join(' \u00b7 ') + '</div>';
    }
    if (claimedDate && lastCommitDate
        && (nowMs - claimedDate.getTime()) > thresholdMs
        && (nowMs - lastCommitDate.getTime()) > thresholdMs) {
      staleClass = ' stale-claim';
    }
  }
  var relChips = buildRelChips(t);
  var relFace = relChipsFaceHTML(relChips, 3);
  var relDetail = relDetailHTML(relChips);
  var footerInner = '';
  if (t.assigned_to) footerInner += crabBadge(t.assigned_to);
  if (staleMeta) footerInner += staleMeta;
  var footer = footerInner ? '<div class="card-footer">' + footerInner + '</div>' : '';

  var goal  = t.goal  ? '<div><div class="dl-label">Goal</div><div class="dl-val">'  + esc(t.goal)  + '</div></div>' : '';
  var why   = t.why   ? '<div><div class="dl-label">Why</div><div class="dl-val">'   + esc(t.why)   + '</div></div>' : '';
  var dw = '';
  if (t.done_when && t.done_when.length) {
    dw = '<div><div class="dl-label">Done when</div><ul class="dl-list">'
      + t.done_when.map(function(d) { return '<li>' + esc(d) + '</li>'; }).join('')
      + '</ul></div>';
  }
  var desired = detailRow('Desired output', bulletOrProse(t.desired_output));
  var success = detailRow('Success signals', bulletOrProse(t.success_signals));
  var failure = detailRow('Failure signals', bulletOrProse(t.failure_signals));
  var tests   = detailRow('Tests', bulletOrProse(t.tests));
  var notes = t.notes ? '<div><div class="dl-label">Notes</div><div class="dl-val pre">' + esc(t.notes) + '</div></div>' : '';
  var rejection = (t.rejection_reason && t.rejection_reason.toLowerCase() !== 'n/a')
    ? '<div><div class="dl-label">Rejection reason</div><div class="dl-val">' + esc(t.rejection_reason) + '</div></div>'
    : '';

  var detail = failureRow + verifRow + goal + why + dw + desired + success + failure + tests + relDetail + notes + rejection;
  var robot = (t.status === 'in-progress') ? robotSvg(t.assigned_to) : '';
  return '<div class="card' + rejClass + statusClass + staleClass + '" onclick="toggleCard(this)">'
    + robot
    + fsChip
    + '<div class="card-top">'
    + '<span class="card-id">' + esc(t.id) + '</span>'
    + '<div class="badges">' + priorityBadge(t.priority) + (t.effort ? '<span class="badge b-effort">' + esc(t.effort) + '</span>' : '') + '</div>'
    + '</div>'
    + '<div class="card-title">' + esc(t.title || t.id) + '</div>'
    + failChip
    + verifChip
    + relFace
    + (detail ? '<div class="card-detail"><div class="detail-inner">' + detail + '</div></div>' : '')
    + footer
    + '</div>';
}

function render() {
  var gen = D.generated ? new Date(D.generated).toLocaleString() : '';
  if (gen) document.getElementById('gen-time').textContent = 'generated ' + gen;

  var buckets = {open:[], 'in-progress':[], done:[], blocked:[], 'not-doing':[]};
  D.tickets.forEach(function(t) { if (buckets[t.status]) buckets[t.status].push(t); });
  var colKeys = {open:'backlog','in-progress':'inprogress',done:'done',blocked:'blocked'};
  Object.keys(colKeys).forEach(function(status) {
    var list = (typeof filterAndSort === 'function') ? filterAndSort(buckets[status]) : buckets[status];
    var k = colKeys[status];
    document.getElementById('c-'+k).innerHTML = list.length ? list.map(function(t) { return cardHTML(t); }).join('') : '<div class="empty">No tickets</div>';
    document.getElementById('n-'+k).textContent = list.length;
  });
  var ndListAll = buckets['not-doing'];
  var ndList = (typeof filterAndSort === 'function') ? filterAndSort(ndListAll) : ndListAll;
  document.getElementById('c-notdoing').innerHTML = ndList.length ? ndList.map(function(t) { return cardHTML(t, true); }).join('') : '<div class="empty">No tickets</div>';
  document.getElementById('n-notdoing').textContent = ndList.length;
  if (ndListAll.length) document.getElementById('btn-rejected').style.display = '';

  var byId = {};
  D.tickets.forEach(function(t) { byId[t.id] = t; });
  var assigned = {};
  D.feature_sets.forEach(function(fs) { fs.tickets.forEach(function(id) { assigned[id] = true; }); });
  var unassigned = D.tickets.filter(function(t) { return !assigned[t.id]; });
  var sections = D.feature_sets.slice();
  if (unassigned.length) {
    sections.push({id:'__unassigned', name:'Unassigned', goal:'', status:'', tickets:unassigned.map(function(t){return t.id;})});
  }

  var featureSetList = document.getElementById('feature-set-list');
  if (!sections.length) {
    featureSetList.innerHTML = '<div class="empty">No feature sets yet.</div>';
    return;
  }

  featureSetList.innerHTML = sections.map(function(featureSet) {
    var list = featureSet.tickets.map(function(id) { return byId[id]; }).filter(Boolean);
    var done = list.filter(function(t) { return t.status === 'done'; }).length;
    var total = list.filter(function(t) { return t.status !== 'not-doing'; }).length;
    var pct = total ? Math.round(done / total * 100) : 0;
    var isUnassigned = featureSet.id === '__unassigned';
    var progRow = !isUnassigned
      ? '<div class="feature-set-prog-row"><div class="prog-bar"><div class="prog-fill" style="width:' + pct + '%"></div></div><span class="prog-label">' + done + ' / ' + total + ' tickets done</span></div>'
      : '';
    var statusBadge = featureSet.status ? '<span class="feature-set-status">' + esc(featureSet.status) + '</span>' : '';
    return '<div class="feature-set">'
      + '<div class="feature-set-head"><div>'
      + '<div class="feature-set-name">' + esc(featureSet.name) + '</div>'
      + (featureSet.goal ? '<div class="feature-set-goal">' + esc(featureSet.goal) + '</div>' : '')
      + '</div>' + statusBadge + '</div>'
      + progRow
      + '<div class="feature-set-cards">' + (list.length ? list.map(function(t) { return cardHTML(t); }).join('') : '<div class="empty">No tickets</div>') + '</div>'
      + '</div>';
  }).join('');
}

// --- filter/sort (CM-069) ---
var FILTER_KEY = 'hb_board_filters_v1';
var FILTER_DEFAULT = { priority: '', effort: '', featureset: '', sort: 'default', readyOnly: false };
var FILTER_STATE = Object.assign({}, FILTER_DEFAULT);
var PRIO_ORDER = { critical: 4, high: 3, medium: 2, low: 1 };
var EFF_ORDER = { xs: 1, s: 2, m: 3, l: 4, xl: 5 };

function loadFilterState() {
  try {
    var saved = JSON.parse(localStorage.getItem(FILTER_KEY) || '{}');
    Object.keys(FILTER_DEFAULT).forEach(function(k) {
      var def = FILTER_DEFAULT[k];
      var val = saved[k];
      if (typeof val === typeof def) FILTER_STATE[k] = val;
    });
  } catch (e) { /* ignore */ }
}
function saveFilterState() {
  try { localStorage.setItem(FILTER_KEY, JSON.stringify(FILTER_STATE)); } catch (e) { /* ignore */ }
}
function isFilterDefault() {
  return Object.keys(FILTER_DEFAULT).every(function(k) { return FILTER_STATE[k] === FILTER_DEFAULT[k]; });
}
function passesFilter(t) {
  if (FILTER_STATE.priority && (t.priority || '').toLowerCase() !== FILTER_STATE.priority.toLowerCase()) return false;
  if (FILTER_STATE.effort   && (t.effort   || '').toUpperCase() !== FILTER_STATE.effort.toUpperCase()) return false;
  if (FILTER_STATE.featureset && t.feature_set !== FILTER_STATE.featureset) return false;
  if (FILTER_STATE.readyOnly && (t.status === 'open' || t.status === 'in-progress')) {
    var bb = t.blocked_by || [];
    if (bb.length > 0) {
      var allDone = bb.every(function(id) {
        var ref = D.tickets.find(function(x) { return x.id === id; });
        return ref && ref.status === 'done';
      });
      if (!allDone) return false;
    }
  }
  return true;
}
function sortTickets(list) {
  var sortKey = FILTER_STATE.sort;
  if (sortKey === 'default') return list;
  var indexed = list.map(function(t, i) { return { t: t, i: i }; });
  var prio = function(t) { return PRIO_ORDER[(t.priority || '').toLowerCase()] || 0; };
  var eff  = function(t) { return EFF_ORDER[(t.effort   || '').toLowerCase()] || 0; };
  var cmp;
  if (sortKey === 'prio-desc')   cmp = function(a, b) { return prio(b.t) - prio(a.t) || a.i - b.i; };
  else if (sortKey === 'prio-asc')    cmp = function(a, b) { return prio(a.t) - prio(b.t) || a.i - b.i; };
  else if (sortKey === 'effort-asc')  cmp = function(a, b) { return eff(a.t)  - eff(b.t)  || a.i - b.i; };
  else if (sortKey === 'effort-desc') cmp = function(a, b) { return eff(b.t)  - eff(a.t)  || a.i - b.i; };
  else return list;
  return indexed.sort(cmp).map(function(x) { return x.t; });
}
function filterAndSort(list) { return sortTickets(list.filter(passesFilter)); }

function populateFilterOptions() {
  var sel = document.getElementById('flt-featureset');
  if (!sel) return;
  D.feature_sets.forEach(function(fs) {

var TICKET_PREFIX = "HB";
var TICKET_ID_RE = new RegExp('^' + TICKET_PREFIX + '-(\\d+)$');
function nextTicketIdNumber() {
  var max = 0;
  D.tickets.forEach(function(t) {
    var m = (t.id || '').match(TICKET_ID_RE);
    if (m) max = Math.max(max, parseInt(m[1], 10));
  });
  return max + 1;
}
function formatTicketId(n) {
  var s = String(n);
  while (s.length < 3) s = '0' + s;
  return TICKET_PREFIX + '-' + s;
}
function utf8ToBase64(str) {
  var bytes = new TextEncoder().encode(str);
  var binary = '';
  for (var i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
  return btoa(binary);
}
function renderTicketMarkdown(ticketId, payload) {
  var lines = [];
  lines.push('# [' + ticketId + '] ' + payload.title);
  lines.push('');
  lines.push('- **Status**: open');
  lines.push('- **Priority**: ' + payload.priority);
  lines.push('- **Effort**: ' + payload.effort);
  if (payload.feature_set) lines.push('- **Feature set**: ' + payload.feature_set);
  lines.push('- **Assigned to**: ' + (payload.assigned_to || ''));
  lines.push('- **Started**: ');
  lines.push('- **Completed**: ');
  lines.push('');
  lines.push('## Goal');
  lines.push((payload.goal || 'TBD').trim());
  lines.push('');
  if (payload.why) {
    lines.push('## Why');
    lines.push(payload.why.trim());
    lines.push('');
  }
  lines.push('## Done when');
  lines.push((payload.done_when || 'TBD').trim());
  lines.push('');
  if (payload.notes) {
    lines.push('## Notes');
    lines.push(payload.notes.trim());
    lines.push('');
  }
  return lines.join('\n');
}

async function createStory() {
  var title = document.getElementById('f-title').value.trim();
  if (!title) { document.getElementById('f-title').focus(); return; }
  var priority = document.getElementById('f-priority').value;
  var effort   = document.getElementById('f-effort').value;
  if (!priority || !effort) { showToast('Priority and effort are required.'); return; }

  var token = getGithubToken();
  if (!token) { promptSetup(function() { createStory(); }); return; }

  if (!DEFAULT_REPO) { showToast('No GitHub repo detected.'); return; }

  var goal    = document.getElementById('f-goal').value.trim();
  var why     = document.getElementById('f-why').value.trim();
  var doneRaw = document.getElementById('f-done').value.trim();
  var notes   = document.getElementById('f-notes').value.trim();
  var fsId    = document.getElementById('f-featureset').value;
  var assignedTo = document.getElementById('f-assigned') ? document.getElementById('f-assigned').value.trim() : '';

  var payload = { title: title, goal: goal || 'TBD', done_when: doneRaw || 'TBD', priority: priority, effort: effort };
  if (why) payload.why = why;
  if (notes) payload.notes = notes;
  if (assignedTo) payload.assigned_to = assignedTo;
  if (fsId) {
    var matchedFs = D.feature_sets.filter(function(fs) { return fs.id === fsId; })[0];
    if (matchedFs) payload.feature_set = matchedFs.id;
  }

  var btn = document.querySelector('#modal .btn-primary');
  var origText = btn.textContent;
  btn.textContent = 'Creating...';
  btn.disabled = true;

  try {
    var idNum = nextTicketIdNumber();
    var attempt = 0;
    while (attempt < 5) {
      var ticketId = formatTicketId(idNum);
      var ts = Math.floor(Date.now() / 1000);
      var filePath = 'horde-of-bots/backlog/' + ticketId + '-' + ts + '.md';
      var markdown = renderTicketMarkdown(ticketId, payload);
      var commitMsg = ticketId + ': ' + payload.title;

      var url = 'https://api.github.com/repos/' + DEFAULT_REPO + '/contents/' + filePath;
      console.log('[create-story] PUT', url, 'attempt', attempt + 1);
      var res = await fetch(url, {
        method: 'PUT',
        headers: {
          'Authorization': 'Bearer ' + token,
          'Accept': 'application/vnd.github+json',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          message: commitMsg,
          content: utf8ToBase64(markdown),
          branch: 'main'
        })
      });
      var data = await res.json().catch(function() { return {}; });
      console.log('[create-story] response', res.status, data);

      if (res.status === 201) {
        closeModal();
        showToast(ticketId + ' created in backlog.');
        return;
      }
      if (res.status === 401 || res.status === 403) {
        clearGithubToken();
        closeModal();
        promptSetup(function() { openModal(); }, (data.message || 'Access denied. Check your GitHub token.'));
        return;
      }
      if (res.status === 422) {
        // Path conflict (someone else just created CM-NNN). Bump and retry.
        console.warn('[create-story] 422 conflict, bumping ID');
        idNum++;
        attempt++;
        continue;
      }
      // Other error — surface and stop.
      console.error('[create-story] failed:', res.status, data);
      showToast('Error: HTTP ' + res.status + (data.message ? ' — ' + data.message : ''));
      return;
    }
    showToast('Could not claim a ticket ID after 5 attempts. Refresh and try again.');
  } catch(e) {
    console.error('[create-story] network error:', e);
    showToast('Network error: ' + e.message);
  } finally {
    btn.textContent = origText;
    btn.disabled = false;
  }
}

var _toastTimer;
function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function() { el.classList.remove('show'); }, 5000);
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') { closeModal(); closeSetupModal(); }
});

<script id="hb-poll-config" type="application/json">{"repo": "", "poll_seconds": 30, "head_sha": "8cf1e0237ad7ef20cd6dda4e19d2a758fb1d0645"}</script>
<script>
(function() {
  // Poll the GitHub commits API; if HEAD on main changed, reload the page.
  // Auth: user's PAT from localStorage (also used by Add Story); falls back to anonymous for public repos.
  var cfg = JSON.parse(document.getElementById('hb-poll-config').textContent);
  if (!cfg.repo) {
    console.warn('[hb-poll] no repo detected, polling disabled');
    return;
  }
  // file:// views are local snapshots — reloading just re-loads the same stale
  // file. Only useful when served over http(s) (GitHub Pages / a live server).
  if (location.protocol === 'file:') {
    console.info('[hb-poll] file:// detected — polling disabled (open via http(s) for live updates)');
    return;
  }

  var intervalSec = Math.max(10, parseInt(cfg.poll_seconds, 10) || 30);
  var indicator = document.getElementById('hb-live-indicator');
  if (indicator) {
    indicator.style.display = 'flex';
    var label = indicator.querySelector('.hb-live-label');
    if (label) label.textContent = 'polling';
  }

  var lastSha = cfg.head_sha || null;
  var consecutiveFailures = 0;

  function getToken() { return localStorage.getItem('hb_github_token') || ''; }

  async function pollOnce() {
    if (document.hidden) return;
    try {
      var headers = { 'Accept': 'application/vnd.github+json' };
      var token = getToken();
      if (token) headers['Authorization'] = 'Bearer ' + token;
      var res = await fetch('https://api.github.com/repos/' + cfg.repo + '/commits/main', { headers: headers });
      if (res.status === 403) {
        console.warn('[hb-poll] rate limited, backing off');
        consecutiveFailures++;
        return;
      }
      if (!res.ok) {
        console.warn('[hb-poll] HTTP', res.status);
        consecutiveFailures++;
        return;
      }
      consecutiveFailures = 0;
      var body = await res.json();
      var sha = body && body.sha;
      if (!sha) return;
      if (lastSha && sha !== lastSha) {
        console.log('[hb-poll] HEAD changed', lastSha, '->', sha, '— reloading');
        location.reload();
        return;
      }
      lastSha = sha;
    } catch (e) {
      console.warn('[hb-poll] error', e);
      consecutiveFailures++;
    }
  }

  // Initial poll + interval
  pollOnce();
  setInterval(function() {
    if (consecutiveFailures > 5) return; // give up after sustained failures; user can refresh manually
    pollOnce();
  }, intervalSec * 1000);

  // Fast-path on tab visibility return
  document.addEventListener('visibilitychange', function() {
    if (!document.hidden) pollOnce();
  });
})();
</script>

          <option>Critical</option>
        </select>
      </div>
      <div class="field">
        <label>Effort</label>

          <option value="">—</option>

          <option>S</option>
          <option>M</option>
          <option>L</option>
          <option>XL</option>

      </div>

        <input type="text" id="f-assigned" placeholder="Name or handle">
      </div>
    </div>
    <div class="field">
      <label>Goal</label>
      <textarea id="f-goal" placeholder="One sentence: what does this do?"></textarea>
    </div>
    <div class="field">
