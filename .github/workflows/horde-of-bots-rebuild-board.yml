name: horde-of-bots rebuild board

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Detect horde-of-bots presence
        id: detect
        run: |
          if [ -f horde-of-bots/build.sh ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "horde-of-bots/build.sh not found in checkout — local-only mode or horde-of-bots/ gitignored. Skipping board rebuild."
          fi

      - name: Build board
        if: steps.detect.outputs.present == 'true'
        run: bash horde-of-bots/build.sh

      - name: Build demo board
        if: steps.detect.outputs.present == 'true' && hashFiles('demo/data.json') != ''
        run: CHANGEMATE_DEMO=1 bash horde-of-bots/build.sh

      - name: Resolve auto_commit_board
        id: resolve
        if: steps.detect.outputs.present == 'true'
        run: |
          if [ ! -f horde-of-bots/config.json ]; then
            echo "should_commit=true" >> "$GITHUB_OUTPUT"
            echo "reason=no config.json — default to commit so Pages stays fresh"
            exit 0
          fi
          EXPLICIT=$(jq -r '.auto_commit_board // empty' horde-of-bots/config.json)
          if [ "$EXPLICIT" = "false" ]; then
            echo "should_commit=false" >> "$GITHUB_OUTPUT"
            echo "reason=explicit auto_commit_board=false"
          else
            echo "should_commit=true" >> "$GITHUB_OUTPUT"
            echo "reason=default — commit rebuilt board"
          fi

      - name: Commit and push updated boards
        if: steps.detect.outputs.present == 'true' && steps.resolve.outputs.should_commit == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add horde-of-bots/board.html
          if [ -f demo/index.html ]; then
            git add demo/index.html
          fi
          git diff --cached --quiet || git commit -m "chore: rebuild board [skip ci]"
          git push
